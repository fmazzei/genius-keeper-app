<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep navy -->
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <!-- Cheese wheel gradient: warm golden amber -->
    <radialGradient id="cheese" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Rind gradient: darker edge -->
    <radialGradient id="rind" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="transparent"/>
      <stop offset="84%" stop-color="#92400e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <!-- Star glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Subtle background ring hint -->
  <circle cx="256" cy="270" r="195" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.3"/>

  <!-- ── Cheese wheel (top view) ── -->

  <!-- Main cheese body -->
  <circle cx="256" cy="270" r="178" fill="url(#cheese)"/>

  <!-- Rind edge overlay -->
  <circle cx="256" cy="270" r="178" fill="url(#rind)"/>
  <circle cx="256" cy="270" r="178" fill="none" stroke="#92400e" stroke-width="10" opacity="0.6"/>

  <!-- Surface texture: subtle inner ring -->
  <circle cx="256" cy="270" r="152" fill="none" stroke="#fde68a" stroke-width="1.5" opacity="0.25"/>

  <!-- Characteristic cheese "eyes" (holes) -->
  <!-- Large hole upper-left -->
  <circle cx="195" cy="225" r="32" fill="#92400e" opacity="0.55"/>
  <circle cx="195" cy="225" r="26" fill="#78350f" opacity="0.45"/>
  <circle cx="188" cy="218" r="8" fill="#fef3c7" opacity="0.12"/>

  <!-- Medium hole upper-right -->
  <circle cx="308" cy="210" r="22" fill="#92400e" opacity="0.55"/>
  <circle cx="308" cy="210" r="17" fill="#78350f" opacity="0.45"/>
  <circle cx="302" cy="204" r="5" fill="#fef3c7" opacity="0.12"/>

  <!-- Medium hole lower-right -->
  <circle cx="318" cy="315" r="26" fill="#92400e" opacity="0.55"/>
  <circle cx="318" cy="315" r="20" fill="#78350f" opacity="0.45"/>
  <circle cx="311" cy="308" r="6" fill="#fef3c7" opacity="0.12"/>

  <!-- Small hole lower-left -->
  <circle cx="205" cy="330" r="17" fill="#92400e" opacity="0.50"/>
  <circle cx="205" cy="330" r="13" fill="#78350f" opacity="0.40"/>

  <!-- Small hole center-ish -->
  <circle cx="262" cy="285" r="13" fill="#92400e" opacity="0.45"/>
  <circle cx="262" cy="285" r="10" fill="#78350f" opacity="0.35"/>

  <!-- ── "Genius" star / sparkle ── upper right, outside cheese, bright accent -->
  <!-- Star shape: 4-point + halo glow -->
  <circle cx="388" cy="112" r="22" fill="#f59e0b" opacity="0.18" filter="url(#glow)"/>
  <circle cx="388" cy="112" r="12" fill="#fde68a" opacity="0.3"/>

  <!-- 4-point star -->
  <path d="M388,85 L393,105 L413,112 L393,119 L388,139 L383,119 L363,112 L383,105 Z"
        fill="#fef3c7" filter="url(#glow)" opacity="0.95"/>

  <!-- Small dot sparkles around star -->
  <circle cx="416" cy="90" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="362" cy="136" r="2.5" fill="#fde68a" opacity="0.6"/>
  <circle cx="420" cy="132" r="2" fill="#fde68a" opacity="0.5"/>

  <!-- ── "GK" subtle monogram at bottom center ── (visible at larger sizes) -->
  <!-- Two short bold bars forming abstract "GK" -->
  <!-- G: a C-shape arc (two short arcs = open circle + shelf) -->
  <path d="M 224,420 A 22,22 0 1,1 246,442 L 230,442"
        stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- K: vertical + two diagonals -->
  <line x1="276" y1="398" x2="276" y2="444" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="276" y1="421" x2="298" y2="398" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="276" y1="421" x2="298" y2="444" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
</svg>
