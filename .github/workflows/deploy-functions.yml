name: Deploy Cloud Functions (Manual)

on:
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar dependencias de Functions
        run: npm install --prefix functions

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project geniuskeeper-36553 --non-interactive
