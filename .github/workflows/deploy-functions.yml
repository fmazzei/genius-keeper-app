name: Deploy Cloud Functions (Manual)

on:
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Escribir credenciales
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > /tmp/firebase-sa.json

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar dependencias de Functions
        run: npm install --prefix functions

      - name: Deploy Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: firebase deploy --only functions --project geniuskeeper-36553 --non-interactive

      - name: Limpiar credenciales
        if: always()
        run: rm -f /tmp/firebase-sa.json
