name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Construir la app
        run: npm run build

      - name: Deploy a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: geniuskeeper-36553

      - name: Deploy Firestore Rules
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          printf '%s' "$SA_JSON" > /tmp/firebase-sa.json
          npm install -g firebase-tools
          firebase deploy --only firestore:rules --project geniuskeeper-36553 --non-interactive
          rm -f /tmp/firebase-sa.json
