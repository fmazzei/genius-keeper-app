name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Construir la app
        run: npm run build

      # continue-on-error: el paso de Hosting suele fallar por un falso-fallo de
      # red (el release idempotente devuelve 400 "is the current active version"
      # aunque el deploy SÍ se aplicó). Un error real de build se atrapa antes,
      # en el paso "Construir la app". Así el falso rojo no bloquea Rules/Functions.
      - name: Deploy a Firebase Hosting
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: geniuskeeper-36553

      # if: !cancelled() → Rules y Functions se despliegan aunque el paso de
      # Hosting haya fallado (antes se saltaban en cadena y las funciones nunca
      # llegaban a producción).
      - name: Deploy Firestore Rules
        if: ${{ !cancelled() }}
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          printf '%s' "$SA_JSON" > /tmp/firebase-sa.json
          npm install -g firebase-tools
          firebase deploy --only firestore:rules --project geniuskeeper-36553 --non-interactive
          rm -f /tmp/firebase-sa.json

      - name: Instalar dependencias de Cloud Functions
        if: ${{ !cancelled() }}
        run: npm --prefix functions install

      # SIN continue-on-error a propósito: antes enmascaraba fallos reales del
      # deploy de funciones. Desplegar las ~45 funciones a la vez provoca errores
      # 409 "unable to queue the operation" (límite de operaciones concurrentes
      # de GCF) que dejaban funciones SIN actualizar en silencio — así el webhook
      # sincronizarFacturaDesdeZoho quedó con código viejo por varios commits.
      # El deploy es idempotente, así que reintentar resuelve los 409; y si tras
      # 3 intentos sigue fallando, el paso se marca en rojo (señal honesta).
      - name: Deploy Cloud Functions
        if: ${{ !cancelled() }}
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ZOHO_SECRET: ${{ secrets.ZOHO_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          printf '%s' "$SA_JSON" > /tmp/firebase-sa.json
          printf 'ZOHO_SECRET=%s\n' "$ZOHO_SECRET" > functions/.env.geniuskeeper-36553
          npm install -g firebase-tools
          ok=0
          for i in 1 2 3; do
            if firebase deploy --only functions --project geniuskeeper-36553 --non-interactive --force; then ok=1; break; fi
            echo "Deploy de funciones falló (intento $i). Reintentando en 60s..."
            sleep 60
          done
          rm -f /tmp/firebase-sa.json functions/.env.geniuskeeper-36553
          if [ "$ok" != "1" ]; then echo "::error::Deploy de funciones falló tras 3 intentos"; exit 1; fi
