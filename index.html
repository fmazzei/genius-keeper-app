<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Genius Keeper" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Genius Keeper" />
    <meta property="og:image" content="https://geniuskeeper-36553.web.app/apple-touch-icon.png" />
    <meta property="og:image:width" content="180" />
    <meta property="og:image:height" content="180" />
    <title>Genius Keeper</title>
  </head>
  <body>
    <div id="root">
      <!--
        Splash inline: el bundle de la app puede tardar varios segundos en
        descargar/parsear en redes móviles lentas (caso típico: mercaderista
        en campo). Sin esto, el usuario ve una pantalla blanca total hasta
        que React monta — este markup se reemplaza apenas ReactDOM.render()
        corre, así que no requiere limpieza manual.
      -->
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#020617;">
        <div style="width:48px;height:48px;border-radius:9999px;border:4px solid #1e293b;border-top-color:#10b981;animation:gk-spin 0.8s linear infinite;"></div>
        <p style="color:#64748b;font-family:system-ui,-apple-system,sans-serif;font-size:13px;letter-spacing:0.05em;">Cargando Genius Keeper…</p>
      </div>
      <style>@keyframes gk-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
